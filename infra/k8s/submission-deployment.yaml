apiVersion: apps/v1
kind: Deployment
metadata:
  name: uora-submission
  namespace: uora
  labels:
    app: uora-submission
spec:
  replicas: 2
  selector:
    matchLabels:
      app: uora-submission
  template:
    metadata:
      labels:
        app: uora-submission
    spec:
      containers:
      - name: uora-submission
        image: uora-submission:latest # Replace with ECR/registry URI
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        resources:
          requests:
            cpu: "1"
            memory: "2Gi"
          limits:
            cpu: "2"
            memory: "4Gi"
        env:
        - name: WORKERS
          value: "4"
        # Sandbox limitations would be configured here using runtimeClassName: gvisor
---
apiVersion: v1
kind: Service
metadata:
  name: uora-submission-svc
  namespace: uora
spec:
  selector:
    app: uora-submission
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP
