services:
  # --- Object Storage ---
  minio:
    image: minio/minio:latest
    container_name: uora-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: uora
      MINIO_ROOT_PASSWORD: uora12345
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- Time-Series Database ---
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: uora-timescaledb
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: uora
      POSTGRES_PASSWORD: uora12345
      POSTGRES_DB: uora_metrics
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./platform/telemetry/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U uora -d uora_metrics" ]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- Message Broker & Cache ---
  redis:
    image: redis:7-alpine
    container_name: uora-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- Submission API ---
  submission:
    build:
      context: .
      dockerfile: platform/submission/Dockerfile
    container_name: uora-submission
    ports:
      - "8000:8000"
    environment:
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=uora
      - MINIO_SECRET_KEY=uora12345
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - TIMESCALE_HOST=timescaledb
      - TIMESCALE_PORT=5432
      - TIMESCALE_USER=uora
      - TIMESCALE_PASSWORD=uora12345
      - TIMESCALE_DB=uora_metrics
      - BUILD_TIMEOUT=60
      - MAX_UPLOAD_SIZE=52428800
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./uploads:/app/uploads
    depends_on:
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    restart: unless-stopped

  # --- Envoy Sidecar (for telemetry capture) ---
  # In production, this runs as a sidecar in the contestant pod.
  # Locally, we run it standalone for testing.
  envoy:
    image: envoyproxy/envoy:v1.29-latest
    container_name: uora-envoy
    ports:
      - "9901:9901"
      - "10000:10000"
    volumes:
      - ./infra/envoy/envoy.yaml:/etc/envoy/envoy.yaml
    command: [ "-c", "/etc/envoy/envoy.yaml", "--log-level", "debug" ]

volumes:
  minio_data:
  timescale_data:
  redis_data:
