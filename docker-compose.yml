services:
  # --- Object Storage ---
  minio:
    image: minio/minio:latest
    container_name: uora-minio
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-uora}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-${MINIO_SECRET_KEY:?MINIO_ROOT_PASSWORD or MINIO_SECRET_KEY must be set}}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - backend
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 5s
      timeout: 3s
      retries: 5
    mem_limit: 512m
    cpus: 0.5

  # --- Time-Series Database ---
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: uora-timescaledb
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: ${TIMESCALE_USER:-uora}
      POSTGRES_PASSWORD: ${TIMESCALE_PASSWORD:-${TIMESCALEDB_PASSWORD:?TIMESCALE_PASSWORD or TIMESCALEDB_PASSWORD must be set}}
      POSTGRES_DB: ${TIMESCALE_DB:-uora_metrics}
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./uora/telemetry/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    networks:
      - backend
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U uora -d uora_metrics" ]
      interval: 5s
      timeout: 3s
      retries: 5
    mem_limit: 2g
    cpus: 2.0

  # --- Message Broker & Cache ---
  redis:
    image: redis:7-alpine
    container_name: uora-redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    networks:
      - backend
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?REDIS_PASSWORD must be set}", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    mem_limit: 512m
    cpus: 0.5

  # --- Submission API ---
  submission:
    build:
      context: .
      dockerfile: uora/submission/Dockerfile
    container_name: uora-submission
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-uora}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-${MINIO_SECRET_KEY:?MINIO_ROOT_PASSWORD or MINIO_SECRET_KEY must be set}}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
      - TIMESCALE_HOST=timescaledb
      - TIMESCALE_PORT=5432
      - TIMESCALE_USER=${TIMESCALE_USER:-uora}
      - TIMESCALE_PASSWORD=${TIMESCALE_PASSWORD:-${TIMESCALEDB_PASSWORD:?TIMESCALE_PASSWORD or TIMESCALEDB_PASSWORD must be set}}
      - TIMESCALE_DB=${TIMESCALE_DB:-uora_metrics}
      - BUILDKIT_HOST=tcp://buildkitd:1234
      - REGISTRY_URL=registry:5000
      - BUILD_TIMEOUT=600
      - MAX_UPLOAD_SIZE=52428800
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped
    mem_limit: 1g
    cpus: 1.0
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  # --- BuildKit Daemon (replaces Docker socket) ---
  buildkitd:
    image: moby/buildkit:latest
    container_name: uora-buildkitd
    command: --addr tcp://0.0.0.0:1234 --config /etc/buildkit/buildkitd.toml
    networks:
      - backend
      - build_net
    volumes:
      - buildkit_cache:/var/lib/buildkit
      - ./infra/buildkitd.toml:/etc/buildkit/buildkitd.toml:ro
    privileged: true   # buildkitd needs privilege for bind-mount snapshot operations
    mem_limit: 4g
    cpus: 4.0
    healthcheck:
      test: [ "CMD", "buildctl", "--addr", "tcp://0.0.0.0:1234", "debug", "workers" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # --- Builder Service (consumes Redis build queue) ---
  builder:
    build:
      context: .
      dockerfile: uora/sandbox/Dockerfile.builder
    container_name: uora-builder
    env_file:
      - .env
    environment:
      - BUILDKIT_HOST=tcp://buildkitd:1234
      - REGISTRY_URL=registry:5000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-uora}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-${MINIO_SECRET_KEY:?MINIO_ROOT_PASSWORD or MINIO_SECRET_KEY must be set}}
      - TIMESCALE_HOST=timescaledb
      - TIMESCALE_PORT=5432
      - TIMESCALE_USER=${TIMESCALE_USER:-uora}
      - TIMESCALE_PASSWORD=${TIMESCALE_PASSWORD:-${TIMESCALEDB_PASSWORD:?TIMESCALE_PASSWORD or TIMESCALEDB_PASSWORD must be set}}
      - TIMESCALE_DB=${TIMESCALE_DB:-uora_metrics}
      - BUILD_TIMEOUT=600
    depends_on:
      buildkitd:
        condition: service_healthy
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    networks:
      - backend
      - build_net
    restart: unless-stopped
    mem_limit: 2g
    cpus: 2.0
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"from pathlib import Path; import sys; cmd = Path('/proc/1/cmdline').read_text(); sys.exit(0 if 'uora.sandbox.builder' in cmd else 1)\"" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # --- Benchmark Worker (deployed engine -> telemetry -> validation -> score) ---
  benchmarker:
    build:
      context: .
      dockerfile: uora/benchmark/Dockerfile
    container_name: uora-benchmarker
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
      - TIMESCALE_HOST=timescaledb
      - TIMESCALE_PORT=5432
      - TIMESCALE_USER=${TIMESCALE_USER:-uora}
      - TIMESCALE_PASSWORD=${TIMESCALE_PASSWORD:-${TIMESCALEDB_PASSWORD:?TIMESCALE_PASSWORD or TIMESCALEDB_PASSWORD must be set}}
      - TIMESCALE_DB=${TIMESCALE_DB:-uora_metrics}
      - SCENARIO_FILE=data/lobster/sample_actions.json
      - BENCHMARK_WORKER_COUNT=${BENCHMARK_WORKER_COUNT:-50}
      - BENCHMARK_DURATION_SEC=${BENCHMARK_DURATION_SEC:-10}
      - BENCHMARK_MIN_SUCCESS_RATE=${BENCHMARK_MIN_SUCCESS_RATE:-0.01}
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped
    mem_limit: 1g
    cpus: 1.0
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"from pathlib import Path; import sys; cmd = Path('/proc/1/cmdline').read_text(); sys.exit(0 if 'uora.benchmark.worker' in cmd else 1)\"" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # --- Local Docker Registry (contestant images) ---
  registry:
    image: registry:2
    container_name: uora-registry
    ports:
      - "127.0.0.1:5000:5000"
    environment:
      REGISTRY_STORAGE_FILESYSTEM_ROOTDIRECTORY: /var/lib/registry
      REGISTRY_STORAGE_DELETE_ENABLED: "true"
    volumes:
      - registry_data:/var/lib/registry
    networks:
      - backend
      - build_net
    mem_limit: 512m
    cpus: 0.5
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:5000/v2/" ]
      interval: 10s
      timeout: 5s
      retries: 3

  # --- Envoy Sidecar (for telemetry capture) ---
  # In production, this runs as a sidecar in the contestant pod.
  # Locally, we run it standalone for testing.
  telemetry-log-init:
    image: alpine:3.20
    container_name: uora-telemetry-log-init
    command: sh -c "mkdir -p /var/log/uora && touch /var/log/uora/access.log && chmod 0777 /var/log/uora && chmod 0666 /var/log/uora/access.log"
    volumes:
      - telemetry_logs:/var/log/uora
    networks:
      - backend
    restart: "no"

  envoy:
    image: envoyproxy/envoy:v1.29-latest
    container_name: uora-envoy
    ports:
      - "9901:9901"
      - "10000:10000"
    volumes:
      - ./infra/envoy/envoy.yaml:/etc/envoy/envoy.yaml
      - telemetry_logs:/var/log/uora
    command: [ "-c", "/etc/envoy/envoy.yaml", "--log-level", "info" ]
    depends_on:
      telemetry-log-init:
        condition: service_completed_successfully
    networks:
      - backend
    mem_limit: 256m
    cpus: 0.25
    healthcheck:
      test: [ "CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/9901 && printf \"GET /ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3 && grep -q LIVE <&3'" ]
      interval: 10s
      timeout: 5s
      retries: 3

  # --- Telemetry Ingester (Envoy access-log tailer) ---
  ingester:
    build:
      context: .
      dockerfile: uora/telemetry/Dockerfile
    container_name: uora-ingester
    environment:
      - PYTHONUNBUFFERED=1
      - DB_HOST=timescaledb
      - DB_PORT=5432
      - DB_USER=${TIMESCALE_USER:-uora}
      - DB_PASSWORD=${TIMESCALE_PASSWORD:-${TIMESCALEDB_PASSWORD:?TIMESCALE_PASSWORD or TIMESCALEDB_PASSWORD must be set}}
      - DB_NAME=${TIMESCALE_DB:-uora_metrics}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
      - ENVOY_ACCESS_LOG=/var/log/uora/access.log
    volumes:
      - telemetry_logs:/var/log/uora
    depends_on:
      telemetry-log-init:
        condition: service_completed_successfully
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped
    mem_limit: 512m
    cpus: 1.0

networks:
  backend:
    driver: bridge
  build_net:
    driver: bridge
    internal: true

volumes:
  minio_data:
  timescale_data:
  redis_data:
  buildkit_cache:
  registry_data:
  telemetry_logs:
